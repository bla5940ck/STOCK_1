version: '3.9'

services:
  app:
    build: .
    container_name: linebot-us-stock
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:///./app.db
      - DEBUG=False
      - LOG_LEVEL=INFO
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgres:15-alpine
    container_name: linebot-postgres
    environment:
      POSTGRES_USER: linebot
      POSTGRES_PASSWORD: password
      POSTGRES_DB: linebot_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    profiles:
      - postgres

volumes:
  postgres_data:
